name: Check UCAS Lecture

on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs:
      sync_database:
        description: 'Whether to sync the database with the latest lecture info. (Default: false)'
        required: false
        type: boolean
        default: false
      force_sync_database:
        description: 'Whether to force sync the database even if there are no changes. (Default: false)'
        required: false
        type: boolean
        default: false
      force_no_cache:
        description: 'DO NOT load ANY SESSION from cache'
        required: false
        type: boolean
        default: false
      debug:
        description: 'DO NOT SEND NOTIFICATIONS'
        required: false
        type: boolean
        default: false
  
  # schedule:
    # see: https://crontab.guru/ for corn format.
    # UTC  0 => 8 am (GMT+8)
    # UTC  8 => 4 pm (GMT+8)
    # UTC 11 => 7 pm (GMT+8)
    # UTC 13 => 9 pm (GMT+8)
    # ==================
    # At every 10th minute past every hour from 8 through 10. (4pm-7pm)
    # - cron: '*/10 8-10 * * *'       # 18 times
    # At every 30th minute past every hour from 0 through 7 and every hour from 11 through 12. (8am-4pm, 7pm-9pm)
    # - cron: '*/30 0-7,11-12 * * *'  # 20 times
    # At minute 30 past every hour from 13 through 23. (9pm-8am)
    # - cron: '30 13-23 * * *'        # 11 times

    ## totally 49 runs per day, 1470 minutes per month
    ## limits: 2000 minutes per month for private repo (73.5%)


concurrency:
  group: check-lecture
  cancel-in-progress: true

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 7
    steps:
      # Enable Network traffics rules
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: block
          # egress-policy: audit
          # Disable sending telemetry to StepSecurity API, can be set to true or false. This can only be set to true when egress-policy is set to block
          disable-telemetry: true
          disable-file-monitoring: true
          # Server chan: sctapi.ftqq.com:443
          # Sep: *.ucas.ac.cn:443
          # Lecture Selector: *.ucas.ac.cn:8443
          allowed-endpoints: >
            api.github.com:443
            cdn.jsdelivr.net:443
            github.com:443
            registry.npmjs.org:443
            sctapi.ftqq.com:443
            qyapi.weixin.qq.com:443
            *.weixin.qq.com:443
            *.ucas.ac.cn:443
            *.ucas.ac.cn:8443
            xkcts.ucas.ac.cn:8443
            
            
      # Checks-out repo
      - uses: actions/checkout@v6

      # Set up Node
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      
      # 核心步骤：恢复上一次的 Cookie 缓存, 以及
      - name: Restore Session Cookie
        if: ${{ github.event.inputs.force_no_cache == 'false'}}
        id: cache-cookie-restore
        uses: actions/cache/restore@v5
        with:
          key: check-lecture-cache-${{ github.run_id }}
          restore-keys: check-lecture-cache
          # 恢复时，如果找不到精确匹配，就找前缀为 check-lecture-cache 的最新缓存
          path: |
            ./check-lectures/session_cookies.json
            ./check-lectures/humanity_lectures.json
            ./check-lectures/science_lectures.json
      
      # 其他步骤：发送通知、更新数据库等，可以在这里添加
      - name: Sync Database Checkout
        if: ${{ github.event.inputs.sync_database == 'true' || github.event.inputs.force_sync_database == 'true' }}
        uses: actions/checkout@v6
        with:
          repository: Yi-Jun-Wu/UCAS-Lectures
          token: ${{ secrets.UCAS_LECTURES_REPO_WRITE_TOKEN }}
          fetch-depth: 1
          path: check-lectures/lectures

      
      - name: Install npm packages (Isolated for security)
        run: |
          cd check-lectures
          
          # 设置 npm 包的最小发布时间为 10 天，避免安装过于新的包，这些包没有经过充分的社区审查，存在安全风险
          npm config set min-release-age=10

          # 安装 npm 包, 使用 --ignore-scripts 禁用生命周期脚本(postinstall)，避免安装过程中执行恶意代码
          npm install axios axios-cookiejar-support sharp tesseract.js tough-cookie @thednp/domparser @octokit/graphql --ignore-scripts
      
      # 核心步骤：运行主要的脚本，获取最新的讲座信息，发送通知等
      - name: Run main scripts for checking UCAS Lectures
        run: |
          cd check-lectures
          node main.ts ${{ github.event.inputs.sync_database }}
        env:
          # 配置扫描系统需要的账号密码
          SEP_USERNAME: ${{ secrets.SEP_USERNAME }}
          SEP_PASSWORD: ${{ secrets.SEP_PASSWORD }}
          # 配置通知系统需要拉取的注册来源
          COMMENT_NODE_ID_HUMANITY: DC_kwDORqBAz84A93qz
          COMMENT_NODE_ID_SCIENCE: DC_kwDORqBAz84A93rQ
          COMMENT_NODE_ID_HUMANITY_WEBHOOK: DC_kwDORqBAz84A-vCR
          COMMENT_NODE_ID_SCIENCE_WEBHOOK: DC_kwDORqBAz84A-vCd
          # 配置通知系统需要的 RSA 私钥(解密 Api Key)
          RSA_PRIVATE_KEY: ${{ secrets.RSA_PRIVATE_KEY }}
          RSA_PRIVATE_KEY_LONG: ${{ secrets.RSA_PRIVATE_KEY_LONG }}
          # 配置通知系统需要的 GitHub Token
          DISCUSSION_READ_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 强制同步数据库的标志
          DEBUG_FORCE_SYNC: ${{ github.event.inputs.force_sync_database }}
          # 启用调试模式
          DEBUG: ${{ github.event.inputs.debug }}

      # 当需要同步数据库时，提交更改并推送到远程仓库
      - name: Post Sync Database (Commit Changes)
        if: ${{ github.event.inputs.sync_database == 'true' || github.event.inputs.force_sync_database == 'true' }}
        run: |
          cd check-lectures/lectures
          git config user.name "GitHub Actions Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: Sync lecture database (automated) [skip ci]" || echo "No changes to commit"
            git push origin main
          fi

      # 核心步骤：保存当前的 Cookie 缓存
      - name: Restore Session Cookie
        if: always()
        id: cache-cookie-save
        uses: actions/cache/save@v5
        with:
          # GitHub Actions 的 Cache 是不可变的（Immutable）
          # 一旦某个 key 写入成功，它就永远不能被覆盖或更新
          key: check-lecture-cache-${{ github.run_id }}
          path: |
            ./check-lectures/session_cookies.json
            ./check-lectures/humanity_lectures.json
            ./check-lectures/science_lectures.json
